name: Generate Version report

on:
  schedule:
    # Run every 6 hours, but not on weekends
    - cron: "0 */6 * * 1-5"
  workflow_dispatch: # Allow manual triggering

jobs:
  generate-report:
    name: Generate Report
    runs-on: ubuntu-latest

    permissions:
        # Give the default GITHUB_TOKEN write permission to commit and push the
        # added or changed files to the repository.
        contents: write

    steps:
      - uses: actions/checkout@v7

      # Step 2: Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: 1.23 # Specify the Go version you are using

      # Step 3: Run the Go application
      - name: Run Go Application
        run: go run .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: stefanzweifel/git-auto-commit-action@v7.2.0
        with:
            commit_message: Generating version report     
