<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f1f3f4; color: #3c4043; }
        /* GCP Top Navbar */
        .gcp-navbar { background-color: #ffffff; border-bottom: 1px solid #dadce0; height: 48px; }
        /* GCP Left Sidebar */
        .gcp-sidebar { background-color: #ffffff; border-right: 1px solid #dadce0; width: 256px; height: calc(100vh - 48px); position: fixed; }
        /* Flat GCP style cards */
        .gcp-card { background: #ffffff; border: 1px solid #dadce0; border-radius: 8px; box-shadow: none; }
        .main-content { margin-left: 256px; padding: 24px; }
    </style>
</head>
<body>

    <nav class="navbar gcp-navbar sticky-top p-0 px-3 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <span class="fw-medium me-3" style="color: #1a73e8;">Google Cloud</span>
            <span class="text-muted small">My First Project</span>
        </div>
        <div class="w-50 mx-4">
            <input type="search" class="form-control form-control-sm bg-light border-0" placeholder="Search resources, products, and docs" style="border-radius: 8px; height: 36px;">
        </div>
        <div><span class="badge bg-secondary rounded-circle p-2">U</span></div>
    </nav>

    <div class="gcp-sidebar p-3">
        <ul class="nav flex-column gap-1">
            <li class="nav-item"><a class="nav-link text-dark active fw-medium p-2 rounded" href="#" style="background-color: #e8f0fe; color: #1a73e8 !important;">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link text-muted p-2" href="#">Activity</a></li>
            <li class="nav-item"><a class="nav-link text-muted p-2" href="#">IAM & Admin</a></li>
            <li class="nav-item"><a class="nav-link text-muted p-2" href="#">Compute Engine</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0 fw-normal">Project Info</h4>
            <button class="btn btn-sm btn-outline-primary" style="border-radius: 4px;">Edit Project</button>
        </div>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="card gcp-card p-4">
                    <h6 class="text-muted text-uppercase small fw-bold">Project Details</h6>
                    <p class="mb-1"><strong>Project name:</strong> My Awesome App</p>
                    <p class="mb-0"><strong>Project ID:</strong> unique-gcp-id-1234</p>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card gcp-card p-4">
                    <h6 class="text-muted text-uppercase small fw-bold">APIs & Services</h6>
                    <span class="text-success small">● All systems operational</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
